<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Search — OPI</title><link rel="stylesheet" href="/public/opi.css"></head>
<body>
<nav class="nav" id="nav"></nav>
<main class="page">
  <div id="search-header" style="margin-bottom:1.25rem">
    <form id="sf" style="display:flex;gap:.5rem;margin-bottom:1rem">
      <input id="q" type="text" style="flex:1;background:var(--bg2);border:1px solid var(--border);
        border-radius:var(--r);padding:.7rem 1.2rem;color:var(--text);font-size:.95rem;outline:none;"
        placeholder="Search packages, keywords…" autocomplete="off">
      <button class="btn btn-primary" type="submit">Search</button>
    </form>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <p id="result-count" style="font-size:.85rem;color:var(--muted)">Loading…</p>
      <div id="filter-bar" style="display:flex;gap:.5rem"></div>
    </div>
  </div>
  <div class="pkg-grid" id="results">
    <div class="loading-center"><div class="spinner"></div></div>
  </div>
</main>
<footer id="footer"></footer>
<script src="/public/opi.js"></script>
<script>
async function pageInit() {
  const params = new URLSearchParams(location.search);
  let q = params.get('q') || '';
  qs('#q').value = q;

  qs('#sf').onsubmit = e => {
    e.preventDefault();
    q = qs('#q').value.trim();
    history.pushState({}, '', q ? `/search?q=${encodeURIComponent(q)}` : '/search');
    doSearch(q);
  };

  async function doSearch(query) {
    qs('#results').innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
    const { ok, data } = await api(`/packages?q=${encodeURIComponent(query)}&limit=60`);
    const pkgs = ok ? (data.packages || []) : [];
    qs('#result-count').textContent =
      `${data.total || pkgs.length} package${pkgs.length !== 1 ? 's' : ''}${query ? ` for "${query}"` : ''}`;
    qs('#results').innerHTML = pkgs.length
      ? pkgs.map(pkgCard).join('')
      : `<div class="empty" style="grid-column:1/-1">
          <div class="empty-icon">🔍</div>
          <h3>No packages found</h3>
          <p>Try different keywords or <a href="/register">publish your own</a>.</p>
        </div>`;
  }
  await doSearch(q);
}
</script>
</body></html>
