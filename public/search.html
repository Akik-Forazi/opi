<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Search — OPI</title><link rel="stylesheet" href="/public/opi.css"></head>
<body>
<nav class="nav" id="nav"></nav>
<main class="page">
  <div style="margin-bottom:1.1rem">
    <form id="sf" style="display:flex;gap:.5rem;margin-bottom:.75rem">
      <input id="q" type="text" style="flex:1;background:rgba(124,92,252,.04);border:1px solid var(--line2);
        border-radius:var(--r);padding:.6rem 1rem;color:var(--fg);font-size:.9rem;outline:none;
        transition:border-color var(--t)" placeholder="Search packages, keywords…" autocomplete="off">
      <button class="btn btn-primary" type="submit" style="border-radius:var(--r)">Search</button>
    </form>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
      <p id="rcount" style="font-size:.78rem;color:var(--muted);font-family:var(--mono)">Loading…</p>
    </div>
  </div>
  <div class="pkg-grid" id="results"><div class="loading-center"><div class="spinner"></div></div></div>
</main>
<footer id="footer" class="footer"></footer>
<script src="/public/opi.js"></script>
<script>
async function pageInit(){
  const params=new URLSearchParams(location.search);
  let q=params.get('q')||'';
  qs('#q').value=q;
  qs('#q').focus();

  qs('#sf').onsubmit=e=>{
    e.preventDefault();
    q=qs('#q').value.trim();
    history.pushState({},'',(q?`/search?q=${encodeURIComponent(q)}`:'/search'));
    doSearch(q);
  };
  await doSearch(q);
}

async function doSearch(query){
  qs('#results').innerHTML='<div class="loading-center"><div class="spinner"></div></div>';
  const {ok,data}=await api(`/packages?q=${encodeURIComponent(query)}&limit=60`);
  const pkgs=ok?(data.packages||[]):[];
  qs('#rcount').textContent=`${data.total||pkgs.length} package${pkgs.length!==1?'s':''}${query?` matching "${query}"`:' in registry'}`;
  qs('#results').innerHTML=pkgs.length
    ?pkgs.map(pkgCard).join('')
    :`<div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">🔍</div>
        <h3>No packages found</h3>
        <p>Try different keywords or <a href="/register">publish your own</a>.</p>
      </div>`;
}
</script>
</body></html>
