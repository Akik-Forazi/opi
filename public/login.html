<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — OPI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/public/opi.css">
<style>
.auth-wrap { min-height:calc(100vh - var(--nav-h)); display:flex; align-items:center; justify-content:center; padding:2rem 1rem; position:relative; z-index:1; }
.auth-box { width:100%; max-width:380px; }
.auth-logo { text-align:center; margin-bottom:2rem; }
.auth-logo-icon { display:inline-flex; align-items:center; justify-content:center;
  width:52px; height:52px; border-radius:14px; margin-bottom:.75rem;
  background:linear-gradient(135deg,#8b6bff,#5b35e6);
  font-size:1.6rem; box-shadow:0 0 28px rgba(139,107,255,.5); }
.auth-logo h1 { font-family:var(--mono); font-size:1.5rem; font-weight:800; letter-spacing:.1em; }
.auth-logo p { color:var(--muted); font-size:.85rem; margin-top:.25rem; }
.auth-card { background:linear-gradient(145deg,rgba(139,107,255,.05),rgba(12,12,38,.9));
  border:1px solid var(--line2); border-radius:var(--r3); padding:1.75rem 1.5rem;
  box-shadow:0 8px 48px rgba(0,0,0,.5),0 0 0 1px rgba(139,107,255,.08); }
.auth-card::before { content:''; display:block; height:2px; margin:-1.75rem -1.5rem 1.5rem;
  background:linear-gradient(90deg,transparent,var(--accent),var(--acc2),transparent);
  border-radius:var(--r3) var(--r3) 0 0; opacity:.6; }
.pw-wrap { position:relative; }
.pw-wrap input { padding-right:2.5rem; }
.pw-toggle { position:absolute; right:.75rem; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--muted); cursor:pointer; font-size:.85rem; }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">📦</div>
      <h1>OPI</h1>
      <p>Sign in to your account</p>
    </div>
    <div class="auth-card">
      <div id="alert"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Username or Email</label>
          <input id="username" type="text" autocomplete="username" placeholder="akikfaraji or akik@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pw-wrap">
            <input id="password" type="password" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" id="pwt">👁</button>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;border-radius:var(--r);margin-top:.25rem" type="submit" id="submit-btn">
          Sign in
        </button>
      </form>
    </div>
    <p style="text-align:center;color:var(--muted);font-size:.84rem;margin-top:1.25rem">
      Don't have an account? <a href="/register">Create one</a>
    </p>
  </div>
</div>
<script src="/public/opi.js"></script>
<script>
async function pageInit() {
  if (Auth.isLoggedIn()) { window.location.href = '/dashboard'; return; }
  qs('#pwt').onclick = () => { const p=qs('#password'); p.type=p.type==='password'?'text':'password'; };
  qs('#login-form').onsubmit = async e => {
    e.preventDefault();
    const btn = qs('#submit-btn');
    btn.disabled=true; btn.innerHTML='<div class="spinner"></div> Signing in…';
    qs('#alert').innerHTML='';
    const { ok, data } = await api('/auth/login', { method:'POST',
      body:JSON.stringify({ username:qs('#username').value.trim(), password:qs('#password').value }) });
    if (ok) { Auth.setToken(data.token); Auth.setUser(data.user); window.location.href='/dashboard'; }
    else {
      qs('#alert').innerHTML=`<div class="alert alert-error">${esc(data.error||'Login failed')}</div>`;
      btn.disabled=false; btn.textContent='Sign in';
    }
  };
}
</script>
</body></html>
