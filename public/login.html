<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — OPI</title><link rel="stylesheet" href="/public/opi.css"></head>
<body>
<nav class="nav" id="nav"></nav>
<div style="min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:2rem">
  <div style="width:100%;max-width:380px">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:2rem;font-weight:800;margin-bottom:.25rem"><span style="color:var(--accent)">OPI</span></div>
      <h1 style="font-size:1.3rem;font-weight:700">Sign in to your account</h1>
    </div>
    <div class="card card-pad">
      <div id="alert"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Username or Email</label>
          <input id="username" type="text" autocomplete="username" placeholder="akikfaraji" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div style="position:relative">
            <input id="password" type="password" autocomplete="current-password" required
              style="padding-right:2.5rem">
            <button type="button" id="toggle-pw"
              style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);
                background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem">
              👁
            </button>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.25rem" type="submit" id="submit-btn">
          Sign in
        </button>
      </form>
    </div>
    <p style="text-align:center;color:var(--muted);font-size:.875rem;margin-top:1.25rem">
      Don't have an account? <a href="/register">Create one</a>
    </p>
  </div>
</div>
<script src="/public/opi.js"></script>
<script>
async function pageInit() {
  if (Auth.isLoggedIn()) { window.location.href = '/dashboard'; return; }

  qs('#toggle-pw').onclick = () => {
    const p = qs('#password');
    p.type = p.type === 'password' ? 'text' : 'password';
  };

  qs('#login-form').onsubmit = async e => {
    e.preventDefault();
    const btn = qs('#submit-btn');
    btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Signing in…';
    qs('#alert').innerHTML = '';

    const { ok, data } = await api('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ username: qs('#username').value.trim(), password: qs('#password').value })
    });

    if (ok) {
      Auth.setToken(data.token);
      Auth.setUser(data.user);
      window.location.href = '/dashboard';
    } else {
      qs('#alert').innerHTML = `<div class="alert alert-error">${esc(data.error || 'Login failed')}</div>`;
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  };
}
</script>
</body></html>
