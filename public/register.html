<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register — OPI</title><link rel="stylesheet" href="/public/opi.css"></head>
<body>
<nav class="nav" id="nav"></nav>
<div style="min-height:calc(100vh - var(--nav-h));display:flex;align-items:center;justify-content:center;padding:2rem 1rem;position:relative;z-index:1">
  <div style="width:100%;max-width:390px">
    <div style="text-align:center;margin-bottom:1.75rem">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--blue));margin-bottom:.75rem;font-weight:900;font-size:1.1rem;color:#fff;box-shadow:0 0 24px var(--acc-glow)">O</div>
      <h1 style="font-size:1.25rem;font-weight:800;margin-bottom:.25rem">Create your account</h1>
      <p style="font-size:.82rem;color:var(--muted)">Join the Omnikarai community</p>
    </div>
    <div class="panel">
      <div style="padding:1.25rem">
        <div id="alert"></div>
        <form id="rf">
          <div class="form-group">
            <label>Username <span style="color:var(--red)">*</span></label>
            <input id="un" type="text" autocomplete="username" placeholder="akikfaraji" required>
            <div class="form-hint">3–32 chars · letters, numbers, - or _</div>
          </div>
          <div class="form-group">
            <label>Display name</label>
            <input id="dn" type="text" placeholder="Akik Faraji">
          </div>
          <div class="form-group">
            <label>Email <span style="color:var(--red)">*</span></label>
            <input id="em" type="email" autocomplete="email" placeholder="akik@fraziym.dev" required>
          </div>
          <div class="form-group" style="margin-bottom:1.1rem">
            <label>Password <span style="color:var(--red)">*</span></label>
            <div style="position:relative">
              <input id="pw" type="password" autocomplete="new-password" required style="padding-right:2.5rem">
              <button type="button" id="tpw" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem">👁</button>
            </div>
            <div id="pwrules" style="display:none;margin-top:.5rem;display:flex;flex-direction:column;gap:.25rem"></div>
          </div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;border-radius:var(--r)" type="submit" id="sb">Create account</button>
          <p style="text-align:center;font-size:.7rem;color:var(--muted);margin-top:.65rem">By registering you agree to our <a href="/help#terms">Terms of Service</a>.</p>
        </form>
      </div>
    </div>
    <p style="text-align:center;color:var(--muted);font-size:.82rem;margin-top:1.1rem">Already have an account? <a href="/login">Sign in</a></p>
  </div>
</div>
<script src="/public/opi.js"></script>
<script>
async function pageInit(){
  if(Auth.isLoggedIn()){location.href='/dashboard';return}
  qs('#tpw').onclick=()=>{const p=qs('#pw');p.type=p.type==='password'?'text':'password'};
  qs('#pw').oninput=function(){
    const v=this.value,el=qs('#pwrules');
    const rules=[[v.length>=8,'At least 8 characters'],[/[A-Z]/.test(v),'One uppercase letter'],[/[0-9]/.test(v),'One number']];
    if(v){el.style.display='flex';el.innerHTML=rules.map(([ok,t])=>`<div style="font-size:.72rem;color:${ok?'var(--cyan)':'var(--muted)'};">${ok?'✓':'○'} ${t}</div>`).join('')}
    else el.style.display='none';
  };
  qs('#rf').onsubmit=async e=>{
    e.preventDefault();
    const btn=qs('#sb');btn.disabled=true;btn.innerHTML='<div class="spinner" style="width:14px;height:14px"></div> Creating…';
    qs('#alert').innerHTML='';
    const {ok,data}=await api('/auth/register',{method:'POST',body:JSON.stringify({
      username:qs('#un').value.trim(),email:qs('#em').value.trim(),
      password:qs('#pw').value,display_name:qs('#dn').value.trim()
    })});
    if(ok){Auth.setToken(data.token);Auth.setUser(data.user);location.href='/dashboard'}
    else{qs('#alert').innerHTML=`<div class="alert alert-error">${esc(data.error||'Registration failed')}</div>`;btn.disabled=false;btn.textContent='Create account'}
  };
}
</script>
</body></html>
