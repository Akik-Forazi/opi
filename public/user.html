<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title id="ptitle">User — OPI</title><link rel="stylesheet" href="/public/opi.css"></head>
<body>
<nav class="nav" id="nav"></nav>
<div id="root"><div class="loading-center" style="height:60vh"><div class="spinner"></div></div></div>
<footer id="footer"></footer>
<script src="/public/opi.js"></script>
<script>
async function pageInit() {
  const username = location.pathname.split('/').pop();
  const { ok, data } = await api(`/user/${username}`);
  if (!ok) {
    qs('#root').innerHTML = `<div class="empty" style="height:60vh">
      <div class="empty-icon">👤</div><h3>User not found</h3>
      <p>@${esc(username)} doesn't exist.</p>
    </div>`; return;
  }
  const user = data;
  document.title = `@${esc(user.username)} · OPI`;
  const pkgs = user.packages || [];
  const totalDL = pkgs.reduce((s,p)=>s+(p.total_downloads||0),0);

  qs('#root').innerHTML = `
  <div class="page" style="display:grid;grid-template-columns:240px 1fr;gap:2.5rem">
    <aside>
      <div style="width:72px;height:72px;border-radius:50%;
        background:linear-gradient(135deg,var(--accent),var(--acc2));
        display:flex;align-items:center;justify-content:center;
        font-size:2rem;font-weight:800;color:#fff;margin-bottom:1rem">
        ${esc((user.display_name||user.username)[0].toUpperCase())}
      </div>
      <h1 style="font-size:1.2rem;font-weight:800">${esc(user.display_name||user.username)}</h1>
      <p style="color:var(--muted);font-size:.875rem;margin-bottom:1rem">@${esc(user.username)}</p>
      ${user.bio ? `<p style="font-size:.875rem;color:var(--muted);margin-bottom:1rem;line-height:1.6">${esc(user.bio)}</p>` : ''}
      <div style="display:flex;flex-direction:column;gap:.5rem;font-size:.85rem;color:var(--muted)">
        <span>📅 Joined ${elapsed(user.joined_at)}</span>
        <span>📦 ${pkgs.length} package${pkgs.length!==1?'s':''}</span>
        <span>⬇ ${fmt(totalDL)} downloads</span>
        ${user.website?`<a href="${esc(user.website)}" target="_blank" rel="noopener"
          style="color:var(--accent)">🌐 ${esc(user.website.replace(/^https?:\/\//,'').slice(0,28))}</a>`:''}
      </div>
    </aside>

    <div>
      <h2 style="font-size:1rem;font-weight:700;margin-bottom:1rem">Packages (${pkgs.length})</h2>
      ${pkgs.length
        ? `<div class="pkg-grid">${pkgs.map(pkgCard).join('')}</div>`
        : `<div class="empty"><div class="empty-icon">📦</div>
            <h3>No packages yet</h3><p>@${esc(user.username)} hasn't published any packages.</p></div>`}
    </div>
  </div>`;
}
</script>
</body></html>
