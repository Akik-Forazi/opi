<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>User — OPI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="opi.css">
</head>
<body>
<nav class="nav" id="nav"></nav>
<div id="root"><div class="loading-center" style="height:70vh"><div class="spinner"></div></div></div>
<footer id="footer" class="footer"></footer>
<script src="opi.js"></script>
<script>
async function pageInit(){
  const username=new URLSearchParams(location.search).get('u');
  if(!username){
    qs('#root').innerHTML='<div class="empty" style="height:60vh"><h3>No user specified</h3><a href="search.html" class="btn btn-ghost btn-sm" style="margin-top:1rem">Browse packages</a></div>';
    return;
  }
  const {ok,data}=await api(`/user/${encodeURIComponent(username)}`);
  if(!ok){
    qs('#root').innerHTML=`<div class="empty" style="height:60vh">
      <h3>User not found</h3>
      <p>@${esc(username)} doesn't exist on OPI.</p>
      <a href="search.html" class="btn btn-ghost btn-sm" style="margin-top:1rem">Browse packages</a>
    </div>`;return;
  }
  const u=data;
  document.title=`@${esc(u.username)} · OPI`;
  const pkgs=u.packages||[];
  const totalDL=pkgs.reduce((s,p)=>s+(p.total_downloads||0),0);

  qs('#root').innerHTML=`
  <div style="border-bottom:1px solid var(--line);background:rgba(4,4,22,.7);width:100%;position:relative;z-index:1">
    <div class="wrap" style="padding-top:1.5rem;padding-bottom:0">
      <div style="display:flex;align-items:flex-end;gap:1.25rem;margin-bottom:1rem;flex-wrap:wrap">
        <div style="width:72px;height:72px;border-radius:50%;flex-shrink:0;
          background:linear-gradient(135deg,var(--accent),var(--acc2));
          display:flex;align-items:center;justify-content:center;
          font-size:2rem;font-weight:900;color:#fff;
          box-shadow:0 0 28px var(--aglow);border:2px solid rgba(124,92,252,.3)">
          ${esc((u.display_name||u.username)[0].toUpperCase())}
        </div>
        <div>
          <h1 style="font-size:1.3rem;font-weight:800">${esc(u.display_name||u.username)}</h1>
          <p style="color:var(--muted);font-size:.82rem;font-family:var(--mono)">@${esc(u.username)}</p>
        </div>
      </div>
      ${u.bio?`<p style="font-size:.85rem;color:var(--muted);max-width:520px;margin-bottom:.75rem;line-height:1.65">${esc(u.bio)}</p>`:''}
      <div style="display:flex;flex-wrap:wrap;gap:1.1rem;font-size:.78rem;color:var(--muted);margin-bottom:.75rem;font-family:var(--mono)">
        <span>Joined ${elapsed(u.joined_at)}</span>
        <span>${pkgs.length} package${pkgs.length!==1?'s':''}</span>
        <span>${fmt(totalDL)} downloads</span>
        ${u.website?`<a href="${esc(u.website)}" target="_blank" rel="noopener" style="color:var(--al)">${esc(u.website.replace(/^https?:\/\//,'').slice(0,36))}</a>`:''}
      </div>
    </div>
  </div>
  <div class="page">
    <div class="section-label" style="margin-bottom:.85rem">Packages</div>
    ${pkgs.length
      ?`<div class="pkg-grid">${pkgs.map(pkgCard).join('')}</div>`
      :`<div class="empty"><h3>No packages yet</h3>
         <p>@${esc(u.username)} hasn't published any packages.</p></div>`
    }
  </div>`;
}
</script>
</body>
</html>
