<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — OPI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="opi.css">
<style>
.copy-btn {
  flex-shrink:0; background:none; border:1px solid var(--line2); cursor:pointer;
  color:var(--muted); padding:.3rem .55rem; border-radius:6px;
  display:flex; align-items:center; gap:.35rem;
  font-size:.72rem; font-family:var(--mono); white-space:nowrap;
  transition:color .15s, background .15s, border-color .15s;
}
.copy-btn:hover { color:var(--fg); background:rgba(139,107,255,.08); border-color:var(--accent); }
.copy-btn.copied { color:var(--acc5); border-color:rgba(77,240,200,.4); background:rgba(77,240,200,.07); }
.copy-btn svg { pointer-events:none; flex-shrink:0; }
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<main class="page" style="position:relative;z-index:1">
  <div id="root"><div class="loading-center" style="height:60vh"><div class="spinner"></div></div></div>
</main>
<footer id="footer" class="footer"></footer>
<script src="opi.js"></script>
<script>
/* ── SVG icons ─────────────────────────────────────────────── */
const ICO_COPY = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const ICO_CHECK = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

/* Copy text and give visual feedback on the button */
function copyValue(btn, value) {
  navigator.clipboard.writeText(value).then(() => {
    btn.innerHTML = ICO_CHECK + '<span>Copied!</span>';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = ICO_COPY + '<span>Copy</span>';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    /* Fallback for older browsers */
    const ta = document.createElement('textarea');
    ta.value = value;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.innerHTML = ICO_CHECK + '<span>Copied!</span>';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = ICO_COPY + '<span>Copy</span>';
      btn.classList.remove('copied');
    }, 2000);
  });
}

async function pageInit() {
  if (!Auth.isLoggedIn()) { location.href = 'login.html'; return; }
  const user = await Auth.fetchUser();
  if (!user) { location.href = 'login.html'; return; }

  const [pkgsData, tokensData] = await Promise.all([
    Promise.all((user.packages || []).map(n => api(`/packages/${n}`))),
    api('/user/tokens')
  ]);
  const pkgs = pkgsData.map(r => r.ok ? r.data : null).filter(Boolean);
  const tokens = tokensData.ok ? (tokensData.data.tokens || []) : [];
  const totalDL = pkgs.reduce((s, p) => s + (p.total_downloads || 0), 0);

  /*
   * pendingToken: holds the FULL token string after creation.
   * It is stored at the JS level (not in the DOM) so it survives
   * render/renderTab calls until the user navigates away.
   */
  let pendingToken = null;
  let tab = 'packages';

  function render() {
    qs('#root').innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.5rem">
      <div>
        <h1 style="font-size:1.4rem;font-weight:800;margin-bottom:.2rem">Dashboard</h1>
        <p style="color:var(--muted);font-size:.82rem;font-family:var(--mono)">@${esc(user.username)}</p>
      </div>
      <div style="display:flex;gap:.5rem">
        <a href="user.html?u=${esc(user.username)}" class="btn btn-ghost btn-sm">View profile</a>
        <a href="settings.html" class="btn btn-outline btn-sm">Settings</a>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(10rem,1fr));gap:.75rem;margin-bottom:1.5rem">
      ${[['Packages', pkgs.length], ['Downloads', fmt(totalDL)], ['API Tokens', `${tokens.length}/10`]].map(([l, v]) => `
      <div class="stat-card">
        <span class="stat-num">${v}</span>
        <span class="stat-lbl">${l}</span>
      </div>`).join('')}
    </div>

    <div class="tab-bar">
      <button class="tab-btn ${tab === 'packages' ? 'active' : ''}" onclick="switchTab('packages')">
        Packages <span class="tab-count">${pkgs.length}</span>
      </button>
      <button class="tab-btn ${tab === 'tokens' ? 'active' : ''}" onclick="switchTab('tokens')">
        API Tokens <span class="tab-count">${tokens.length}</span>
      </button>
    </div>
    <div id="tab-body"></div>`;

    window.switchTab = t => { tab = t; render(); };
    renderTab();
  }

  function renderTab() {
    const c = qs('#tab-body');
    if (tab === 'packages') {
      c.innerHTML = pkgs.length
        ? `<div style="display:flex;flex-direction:column;gap:.6rem">${pkgs.map(p => `
          <div class="panel" style="display:flex;align-items:center;gap:1rem;padding:.85rem 1rem">
            <div style="flex:1;min-width:0">
              <a href="package.html?name=${esc(p.name)}" style="font-weight:700;font-family:var(--mono);font-size:.92rem;color:var(--accent)">${esc(p.name)}</a>
              <span class="badge badge-dim" style="margin-left:.4rem;font-family:var(--mono)">v${esc(p.latest)}</span>
              <p style="font-size:.78rem;color:var(--muted);margin-top:.2rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.description)}</p>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-weight:800;font-family:var(--mono);font-size:.95rem;color:var(--fg)">${fmt(p.total_downloads)}</div>
              <div style="font-size:.68rem;color:var(--muted)">downloads</div>
            </div>
          </div>`).join('')}</div>`
        : `<div class="empty">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="margin:0 auto .75rem;opacity:.3">
              <path d="M6 24l18-14 18 14v22H6V24z" stroke="#b89fff" stroke-width="2.5" stroke-linejoin="round"/>
              <rect x="18" y="32" width="12" height="14" rx="1" stroke="#b89fff" stroke-width="2.5"/>
            </svg>
            <h3>No packages yet</h3>
            <p>Publish your first: <code class="inline-code">omnip publish .</code></p>
           </div>`;
      return;
    }

    /* ── Tokens tab ───────────────────────────────────────── */
    c.innerHTML = `
    <!-- New-token banner: only shown while pendingToken is set -->
    <div id="tok-banner" style="${pendingToken ? '' : 'display:none'}">
      <div style="background:rgba(77,240,200,.07);border:1px solid rgba(77,240,200,.3);
        border-radius:var(--r2);padding:1rem 1.1rem;margin-bottom:1rem">
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.7rem">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--acc5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <strong style="font-size:.82rem;color:var(--acc5)">Save this token — it will not be shown again</strong>
        </div>
        <div style="display:flex;align-items:center;gap:.6rem;background:var(--code);
          border:1px solid rgba(77,240,200,.2);border-radius:var(--r);padding:.65rem .9rem">
          <code id="pending-tok-code" style="flex:1;font-family:var(--mono);font-size:.82rem;
            color:var(--fg);word-break:break-all;user-select:all">${pendingToken ? esc(pendingToken) : ''}</code>
          <button class="copy-btn" id="banner-copy-btn" title="Copy full token">
            ${ICO_COPY}<span>Copy</span>
          </button>
        </div>
        <p style="font-size:.72rem;color:var(--muted);margin-top:.6rem;line-height:1.6">
          CLI: <code style="font-family:var(--mono);color:var(--acc-l)">omnip login &lt;token&gt;</code>
          &nbsp;&nbsp; or set env: <code style="font-family:var(--mono);color:var(--acc-l)">set OPI_TOKEN=&lt;token&gt;</code>
        </p>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
      <p style="font-size:.78rem;color:var(--muted);font-family:var(--mono)">${tokens.length}/10 tokens used</p>
      <button class="btn btn-primary btn-sm" id="new-tok-btn" ${tokens.length >= 10 ? 'disabled' : ''}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New token
      </button>
    </div>

    <div id="tok-list">
      ${tokens.length ? tokens.map((t, i) => `
      <div class="panel" style="display:flex;align-items:center;gap:.6rem;padding:.75rem 1rem;margin-bottom:.5rem">
        <code style="flex:1;font-size:.78rem;color:var(--muted);font-family:var(--mono);word-break:break-all;min-width:0">${esc(t.display)}</code>
        <span style="font-size:.7rem;color:var(--dim);font-family:var(--mono);flex-shrink:0;padding:0 .25rem">${esc(t.label || 'default')}</span>
        <button class="copy-btn tok-copy" data-idx="${i}" title="Copy token (masked)">
          ${ICO_COPY}<span>Copy</span>
        </button>
        <button class="btn btn-danger btn-sm tok-revoke" data-display="${esc(t.display)}">Revoke</button>
      </div>`).join('')
        : `<div class="empty">
            <h3>No API tokens yet</h3>
            <p>Create one to use with <code class="inline-code">omnip publish</code></p>
           </div>`}
    </div>

    <div class="panel" style="margin-top:1rem">
      <div class="panel-hdr"><span>Using API tokens with omnip</span></div>
      <div style="padding:.75rem .85rem;display:flex;flex-direction:column;gap:.5rem">
        <div class="code-block">omnip login opi_your_full_token_here</div>
        <div style="text-align:center;font-size:.72rem;color:var(--muted)">— or —</div>
        <div class="code-block">set OPI_TOKEN=opi_your_full_token_here</div>
        <div class="code-block">omnip publish .</div>
      </div>
    </div>`;

    /* Wire banner copy button to the FULL pendingToken */
    const bannerBtn = qs('#banner-copy-btn');
    if (bannerBtn && pendingToken) {
      const fullToken = pendingToken; /* capture in closure */
      bannerBtn.onclick = () => copyValue(bannerBtn, fullToken);
    }

    /* Wire New token button */
    const newTokBtn = qs('#new-tok-btn');
    if (newTokBtn) newTokBtn.onclick = createToken;

    /* Wire per-row copy buttons — copies masked display (for reference only) */
    qsa('.tok-copy').forEach(btn => {
      const idx = parseInt(btn.dataset.idx);
      const tok = tokens[idx];
      btn.onclick = () => copyValue(btn, tok.display);
      /* Show tooltip warning it's masked */
      btn.title = 'Copy masked token (prefix only)';
    });

    /* Wire revoke buttons */
    qsa('.tok-revoke').forEach(btn => {
      const display = btn.dataset.display;
      btn.onclick = () => revokeToken(display);
    });
  }

  async function createToken() {
    const btn = qs('#new-tok-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Creating…'; }

    const { ok, data } = await api('/user/tokens', { method: 'POST', body: '{}' });
    if (ok) {
      /* Store FULL token at JS level — survives all re-renders */
      pendingToken = data.token;
      tokens.push({
        display: data.token.slice(0, 10) + '...' + data.token.slice(-4),
        label: 'default'
      });
      /* Re-render — pendingToken persists, banner will show with full token */
      render();
    } else {
      if (btn) { btn.disabled = false; btn.innerHTML = '+ New token'; }
    }
  }

  async function revokeToken(display) {
    if (!confirm(`Revoke token ${display}?`)) return;
    const prefix = display.replace(/\.\.\..+$/, '');
    await api(`/user/tokens?token=${encodeURIComponent(prefix)}`, { method: 'DELETE' });
    const i = tokens.findIndex(t => t.display === display);
    if (i >= 0) tokens.splice(i, 1);
    /* Clear pending banner if revoked token matches */
    if (pendingToken && pendingToken.startsWith(prefix)) pendingToken = null;
    render();
  }

  window.switchTab = t => { tab = t; render(); };
  render();
}
</script>
</body>
</html>
